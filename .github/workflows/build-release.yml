permissions:
  contents: write
name: Build OpenWrt Package

on:
  push:
    branches:
      - master
    paths:
      - 'Makefile'
      - '!**/.github/**'
  workflow_dispatch:
  workflow_run:
    workflows: ["Calculating PKG_MIRROR_HASH"]
    types:
      - completed

jobs:
  check:
    name: 1. Resolve & Fingerprint
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.name == 'Calculating PKG_MIRROR_HASH')
    outputs:
      should_build: ${{ steps.decide.outputs.should_build }}
      resolved_tag: ${{ steps.version.outputs.full_version }}
      pkg_version: ${{ steps.version.outputs.version }}
    steps:
      - name: 🧾 Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 📦 Extract Version from Makefile
        id: version
        run: |
          PKG_VERSION=$(grep -E '^PKG_UPSTREAM_VERSION *:?=' Makefile | head -n1 | cut -d= -f2 | tr -d '[:space:]')
          PKG_RELEASE=$(grep -E '^PKG_RELEASE *:?=' Makefile | head -n1 | cut -d= -f2 | tr -d '[:space:]')
          COMBINED_VERSION="v${PKG_VERSION}-r${PKG_RELEASE}"
          echo "📦 Version: $COMBINED_VERSION"
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "full_version=$COMBINED_VERSION" >> "$GITHUB_OUTPUT"
          echo "V_TEMP=$V" >> $GITHUB_ENV

      - name: 🔎 Decide whether build is needed
        id: decide
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.workflow_run.head_commit.message }}
        run: |
          SHOULD_BUILD="true"
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "👋 Manual run detected. Forcing build."
            echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          FULL_V="${{ steps.version.outputs.full_version }}"
          echo "Checking status for full tag: $FULL_V"
          
          MSG="$HEAD_COMMIT_MESSAGE"
          [ -z "$MSG" ] && MSG=$(git log -1 --pretty=%B)
          FP=$(echo "$MSG" | sed -n 's/.*FP=\([0-9a-f]\{64\}\).*/\1/p')
          
          if [ -n "$FP" ] && [ -f .last-fingerprint ]; then
            if [ "$FP" = "$(cat .last-fingerprint)" ]; then
              echo "✅ Fingerprint matches. Skipping."
              SHOULD_BUILD="false"
            fi
          fi
          
          if git ls-remote --exit-code --tags origin "refs/tags/$FULL_V" >/dev/null 2>&1; then
             echo "⚠️ Tag $FULL_V already exists. Skipping build."
             SHOULD_BUILD="false"
          fi
          
          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"
          echo "Final Decision: SHOULD_BUILD=$SHOULD_BUILD"

  build:
    name: 2. Build (${{ matrix.target }} / ${{ matrix.version }})
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - version: openwrt-24.10
            target: x86_64
          - version: openwrt-24.10
            target: aarch64_cortex-a53
          - version: openwrt-24.10
            target: arm_cortex-a7_neon-vfpv4
          - version: openwrt-25.12
            target: x86_64
          - version: openwrt-25.12
            target: aarch64_cortex-a53
          - version: openwrt-25.12
            target: arm_cortex-a7_neon-vfpv4
    outputs:
      pkg_name: ${{ steps.enviroment.outputs.pkg_name }}

    steps:
      - name: 🧾 Checkout repo
        uses: actions/checkout@v6

      - name: 📛 Set Environment
        id: enviroment
        run: |
          PKG_NAME=$(grep -E '^PKG_NAME[:?]?=' Makefile | head -n1 | sed -E 's/PKG_NAME[:?]?= *//')
          echo "PKG_NAME=$PKG_NAME" >> "$GITHUB_ENV"
          echo "ARCH=${{ matrix.target }}-${{ matrix.version }}" >> "$GITHUB_ENV"
          echo "pkg_name=$PKG_NAME-client" >> "$GITHUB_OUTPUT"

      - name: 🧰 Set up openwrt-stuntman feed structure
        run: |
          set -e
          mkdir -p feed/jackie264
          printf 'include $(TOPDIR)/feed/jackie264/*/Makefile\n' > feed/jackie264/custom.mk

          rsync -av \
            --exclude='.git' \
            --exclude='feed' \
            --exclude='.github' \
            --exclude='LICENSE' \
            --exclude='README.md' \
            --exclude='SECURITY.md' \
            ./ feed/jackie264/${PKG_NAME}/

      - name: 🏗️ Build with OpenWrt SDK
        uses: openwrt/gh-action-sdk@v10
        env:
          ARCH: ${{ env.ARCH }}
          FEEDNAME: jackie264
          PACKAGES: ${{ env.PKG_NAME }}
          INDEX: 0
          FEED_DIR: ${{ github.workspace }}/feed
          NO_SHFMT_CHECK: 1
          NO_REFRESH_CHECK: 1
          
      - name: 🔍 Debug build output
        run: |
          echo "=== Build directory structure ==="
          find . -name "*.ipk" -type f 2>/dev/null || echo "No .ipk files found"
          echo "=== bin directory structure ==="
          ls -la bin/ 2>/dev/null || echo "No bin directory found"
          if [ -d "bin/packages" ]; then
            echo "=== packages directory structure ==="
            find bin/packages/ -type f -name "*.ipk" 2>/dev/null || echo "No .ipk files in packages directory"
            echo "=== Full packages directory tree ==="
            ls -laR bin/packages/ 2>/dev/null || echo "No packages directory"
          fi

      - name: 📦 Prepare and Rename APK artifacts
        run: |
          find bin/packages/ -name "*.apk" | while read -r f; do
            mv "$f" "${f%.apk}-${{ matrix.target }}.apk"
          done

      - name: 📦 Upload artifact for ${{ matrix.target }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PKG_NAME }}-${{ matrix.target }}-${{ matrix.version }}
          path: |
            bin/packages/*/jackie264/${{ steps.enviroment.outputs.pkg_name }}*.ipk
            bin/packages/*/jackie264/${{ steps.enviroment.outputs.pkg_name }}*.apk
          if-no-files-found: ignore

  release:
    name: 3. Release & Deploy ${{ github.repository }}
    needs: [check, build]
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout repo
        uses: actions/checkout@v6

      - name: ⬇️ Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./release-assets

      - name: 🚀 Robust Release (Native GH CLI)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.check.outputs.resolved_tag }}
          TITLE: "Build -${{ needs.check.outputs.resolved_tag }}"
        run: |
          gh release view "$TAG" || gh release create "$TAG" --title "$TAG" --notes ""
          echo "Uploading assets to $TAG..."
          find ./release-assets -type f \( -name "stuntman-client*.ipk" -o -name "stuntman-client*.apk" \) | while read -r file; do
            echo "⬆️ Uploading $(basename "$file")..."
            gh release upload "$TAG" "$file" --clobber
          done
          echo "🎉 All assets uploaded successfully."

#      - name: 🗃️ Create GitHub Release
#        uses: softprops/action-gh-release@v2
#        with:
#          tag_name: ${{ needs.check.outputs.resolved_tag }}
#          name: Build-${{ needs.check.outputs.resolved_tag }}
#          files: |
#            ./release-assets/**/${{ needs.build.outputs.pkg_name }}*.ipk
#            ./release-assets/**/${{ needs.build.outputs.pkg_name }}*.apk
#          draft: false
#          prerelease: false
#          overwrite_files: true
#        env:
#          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔑 Checkout custom-packages repo
        uses: actions/checkout@v6
        with:
          repository: OneNAS-space/custom-packages
          token: ${{ secrets.CUSTOM_PACKAGES_TOKEN }}
          path: custom-packages

      - name: 🚚 Update stuntman-client artifacts
        run: |
          set -e
          PKG_NAME="${{ needs.build.outputs.pkg_name }}"

          find ./release-assets -type f \( -name "*.ipk" -o -name "*.apk" \) | while read -r f; do
            base=$(basename "$f")
            archdir=$(echo "$f" | sed -E 's#.*/stuntman-([^/]+)-openwrt.*#\1#')
            if [[ "$base" == *.ipk ]]; then
              pkgname=$(echo "$base" | sed -E 's/^([^_]+)_.*$/\1/')
              dest_dir="custom-packages/releases/packages-24.10/$archdir"
              mkdir -p "$dest_dir"
              echo "Cleaning old versions of $pkgname in $archdir"
              rm -f "$dest_dir/${pkgname}"*.ipk
              cp "$f" "$dest_dir/"
              echo "✅ [24.10] Deployed $base to $archdir"
              ls -la "$dest_dir/${pkgname}"* || echo "No IPKs found"
            elif [[ "$base" == *.apk ]]; then
              standard_name=$(echo "$base" | sed "s/-$archdir//")
              pkgname=$(echo "$standard_name" | cut -d- -f1)
              dest_dir="custom-packages/releases/packages-25.12/$archdir"
              mkdir -p "$dest_dir"
              echo "Cleaning old versions of $pkgname in $archdir"
              rm -f "$dest_dir/${pkgname}"*.apk
              echo "✅ [25.12] Deployed $base as $standard_name to $archdir"
              cp "$f" "$dest_dir/$standard_name"
              ls -la "$dest_dir/${pkgname}"* || echo "No APKs found"
            fi
          done

          cd custom-packages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update $PKG_NAME to ${{ needs.check.outputs.resolved_tag }}" || echo "No changes to commit"
          
          for i in {1..5}; do
            git pull --rebase origin main && \
            git push origin main && break || \
            (echo "Conflict detected, retrying in 5s..." && sleep 5)
          done

      - name: 📝 Update Fingerprint after success
        if: success()
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.workflow_run.head_commit.message }}
        run: |
          FP=$(echo "$HEAD_COMMIT_MESSAGE" | sed -n 's/.*FP=\([0-9a-f]\{64\}\).*/\1/p')
          if [ -n "$FP" ]; then
            echo "$FP" > .last-fingerprint
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .last-fingerprint
            git commit -m "chore: update fingerprint to $FP [skip ci]"
            git push origin main
          fi
